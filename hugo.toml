baseURL       = "/"
languageCode  = "en-gb"
title         = "RSE Group"
paginate      = 10
enableRobotsTXT = true

[params]
  shortName   = "MORU RSE Group"
  navSubtitle = "Research Software Engineering"
  description = "We partner with researchers to build robust, maintainable, and reproducible research software."
  footerDesc  = "We partner with researchers to build robust, maintainable, and reproducible research software."

  # Social links
  github   = "https://github.com/MORU-RSE"
  website = "https://www.tropmedres.ac/"
  email    = "tanaphum@tropmedres.ac"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # Allow raw HTML in markdown
  [markup.highlight]
    style          = "monokai"
    lineNos        = false
    codeFences     = true

[taxonomies]
  tag      = "tags"
  category = "categories"

